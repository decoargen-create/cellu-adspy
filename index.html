    // Create React wrapper components for Lucide vanilla icons
    const makeLucideIcon = (name) => {
      return ({ className = '', ...props }) => {
        const ref = React.useRef(null);
        React.useEffect(() => {
          if (ref.current) {
            ref.current.innerHTML = '';
            const iconData = lucide.icons[name];
            if (iconData) {
              const svgStr = iconData.toSvg ? iconData.toSvg() : '';
              if (svgStr) {
                ref.current.innerHTML = svgStr;
              } else {
                const el = lucide.createElement(iconData);
                ref.current.appendChild(el);
              }
              const svg = ref.current.querySelector('svg');
              if (svg) {
                svg.removeAttribute('width');
                svg.removeAttribute('height');
                svg.setAttribute('class', className);
              }
            }
          }
        }, [className]);
        return React.createElement('span', { ref, style: { display: 'inline-flex', alignItems: 'center' }, ...props });
      };
    };

    function AnimatedCounter({ value = 0, duration = 600 }) {
      const [displayValue, setDisplayValue] = useState(0);

      useEffect(() => {
        let startTime = null;
        const animate = (currentTime) => {
          if (!startTime) startTime = currentTime;
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          setDisplayValue(Math.floor(value * progress));
          if (progress < 1) {
            requestAnimationFrame(animate);
          }
        };
        requestAnimationFrame(animate);
      }, [value, duration]);

      return <span>{displayValue}</span>;
    }

    function FileDropZone({ files, onAdd, onRemove }) {
      const [dragging, setDragging] = useState(false);
      const [linkInput, setLinkInput] = useState("");
      const fileInputRef = useRef(null);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setDragging(false);
        const dropped = Array.from(e.dataTransfer.files);
        dropped.forEach(f => onAdd({ name: f.name, type: "file", size: f.size }));
      }, [onAdd]);

      const handleFileSelect = useCallback((e) => {
        const selected = Array.from(e.target.files);
        selected.forEach(f => onAdd({ name: f.name, type: "file", size: f.size }));
        e.target.value = "";
      }, [onAdd]);

      const addLink = () => {
        if (!linkInput.trim()) return;
        onAdd({ name: linkInput.trim(), type: "link" });
        setLinkInput("");
      };

      return (
        <div className="space-y-3">
          {/* Drop zone */}
          <div
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={handleDrop}
            onClick={() => fileInputRef.current?.click()}
            className={`border-2 border-dashed rounded-xl px-5 py-6 text-center cursor-pointer transition-all ${
              dragging
                ? "border-orange-500 bg-orange-500/5 scale-102"
                : "border-gray-700 hover:border-gray-600 bg-gray-800/20 hover:bg-gray-800/40"
            }`}
          >

            </p>

            <input ref={fileInputRef} type="file" multiple className="hidden" onChange={handleFileSelect}
              accept=".pdf,.docx,.doc,.xlsx,.csv,.png,.jpg,.jpeg,.webp,.svg,.txt,.md" />
          </div>

          {/* Link input */}
          <div className="flex gap-2">
            <div className="flex-1 relative">
              <Link className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" />
              <input
                type="text"
                value={linkInput}
                onChange={e => setLinkInput(e.target.value)}
                placeholder="Pega un link (URL, Drive, lo que tengas)"

              <Plus className="w-4 h-4" />
            </button>
          </div>

            <div className="space-y-1.5">
              {files.map((f, i) => (
                <div key={i} className="flex items-center justify-between bg-gray-800/40 rounded-lg px-3.5 py-2 group hover:bg-gray-800/60 transition-all" style={{ animation: `fadeIn 300ms ease ${i * 30}ms both` }}>

      const [genStep, setGenStep] = useState(0);
      const [genDone, setGenDone] = useState(false);
      const [genSummary, setGenSummary] = useState(null);
      const [genMenuOpen, setGenMenuOpen] = useState(false);
      const [genType, setGenType] = useState(null);

      const [selectedAds, setSelectedAds] = useState(new Set());
      const [selectAll, setSelectAll] = useState(false);
      const [viewingReport, setViewingReport] = useState(null);
      const [searchFilter, setSearchFilter] = useState("");
      const [filterBrand, setFilterBrand] = useState("all");
      const [filterPriority, setFilterPriority] = useState("all");
      const [lastUpdated, setLastUpdated] = useState(new Date());

      const selected = products.find(p => p.id === selectedId);
      const latestReport = selected?.reports?.[0];
      const ep = editProduct || EMPTY_PRODUCT;
      const setEp = (key, val) => setEditProduct(prev => ({ ...prev, [key]: val }));

      const dynamicSteps = () => {
        const base = [{ key: "context", label: "Analizando archivos de contexto...", duration: 1800 }];
        (selected?.competitors || []).forEach(c => {
          base.push({ key: `scan-${c.query}`, label: `Escaneando Meta Ad Library: ${c.name}...`, duration: 1200 + Math.random() * 1000 });
        });
        base.push({ key: "filter", label: "Filtrando ads nuevos (3+ días activos)...", duration: 1000 });
        base.push({ key: "adapt", label: "Adaptando ángulos y estética a CELLU+...", duration: 2200 });
        base.push({ key: "brief", label: "Generando reporte DOCX...", duration: 1800 });
        base.push({ key: "download", label: "Preparando descarga...", duration: 800 });
        return base;
      };

      const filteredAds = useMemo(() => {
        if (!latestReport) return [];
        return latestReport.ads.filter(ad => {
          const matchesSearch = !searchFilter ||
            ad.headline.toLowerCase().includes(searchFilter.toLowerCase()) ||
            ad.angle.toLowerCase().includes(searchFilter.toLowerCase());
          const matchesBrand = filterBrand === "all" || ad.brand === filterBrand;
          const matchesPriority = filterPriority === "all" || ad.priority === filterPriority;
          return matchesSearch && matchesBrand && matchesPriority;
        });
      }, [latestReport, searchFilter, filterBrand, filterPriority]);

      const hasUnprocessedAds = useMemo(() => {
        if (!latestReport) return false;
        return latestReport.ads.some(ad => !ad.briefed);
      }, [latestReport]);

      const openNew = () => { setEditProduct({ ...EMPTY_PRODUCT, id: `p-${Date.now()}` }); setFormMode("new"); setView("form"); };
      const openEdit = () => { setEditProduct({ ...selected, competitors: [...selected.competitors], contextFiles: [...selected.contextFiles] }); setFormMode("edit"); setView("form"); };
      const cancel = () => { setView("report"); setEditProduct(null); setFormMode(null); };

      const save = () => {
        if (formMode === "new") { setProducts(prev => [...prev, editProduct]); setSelectedId(editProduct.id); }
        else { setProducts(prev => prev.map(p => p.id === editProduct.id ? editProduct : p)); }
        setView("report"); setEditProduct(null); setFormMode(null);
      };

      const remove = () => {
        const remaining = products.filter(p => p.id !== editProduct.id);
        setProducts(remaining);
        setSelectedId(remaining[0]?.id || null);
        setView("report"); setEditProduct(null); setFormMode(null);
      };

      const addComp = () => {
        if (!newCompName || !newCompQuery) return;
        setEp("competitors", [...ep.competitors, { name: newCompName, query: newCompQuery }]);
        setNewCompName(""); setNewCompQuery("");
      };

      const toggleAd = (id) => {
        setSelectedAds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const toggleAll = () => {
        if (selectAll) { setSelectedAds(new Set()); setSelectAll(false); }
        else {
          const allIds = new Set(filteredAds.map(a => a.id) || []);
          setSelectedAds(allIds);
          setSelectAll(true);
        }
      };

      // Store generated blobs for re-download
      const generatedFiles = useRef({});

      const downloadReport = useCallback((fileName) => {
        const blob = generatedFiles.current[fileName];
        if (blob) triggerDownload(blob, fileName);
      }, []);

      const startGenerate = (type = "both") => {
        const steps = dynamicSteps();
        setGenModal(true);
        setGenStep(0);
        setGenDone(false);
        setGenSummary(null);

        let step = 0;
        const advance = () => {
          step++;
          setGenStep(step);
          if (step < steps.length) {
            setTimeout(advance, steps[step].duration);
          } else {
            const adsInBrief = selectedAds.size > 0
              ? latestReport?.ads.filter(a => selectedAds.has(a.id)) || []
              : latestReport?.ads || [];
            const today = new Date().toISOString().slice(0, 10);
            const typeLabels = { creative: "Adaptación Creativa", strategic: "Análisis Estratégico", both: "Adaptación + Análisis" };

            // === GENERATE REAL DOCX FILES ===
            (async () => {
              try {
                const generated = [];

                if (type === "creative" || type === "both") {
                  const { blob, fileName } = await buildDocxBlob("creative", selected.name, adsInBrief, selected.competitors, selected.contextFiles);
                  generatedFiles.current[fileName] = blob;
                  generated.push({ blob, fileName, reportType: "Adaptación Creativa" });
                  triggerDownload(blob, fileName);
                }

                if (type === "strategic" || type === "both") {
                  const { blob, fileName } = await buildDocxBlob("strategic", selected.name, adsInBrief, selected.competitors, selected.contextFiles);
                  generatedFiles.current[fileName] = blob;
                  generated.push({ blob, fileName, reportType: "Análisis Estratégico" });
                  if (type === "both") {
                    setTimeout(() => triggerDownload(blob, fileName), 500);
                  } else {
                    triggerDownload(blob, fileName);
                  }
                }

                const allFileNames = generated.map(g => g.fileName).join(" + ");
                const summary = {
                  totalAds: adsInBrief.length,
                  winners: adsInBrief.filter(a => a.status === "winner").length,
                  highPriority: adsInBrief.filter(a => a.priority === "ALTA").length,
                  fileName: allFileNames,
                  reportType: typeLabels[type] || typeLabels.both,
                  downloadFiles: generated.map(g => g.fileName),
                };
                setGenSummary(summary);
                setGenDone(true);

                const makeReport = (name, rType) => ({
                  date: today,
                  time: new Date().toLocaleTimeString("es-AR", {hour: "2-digit", minute: "2-digit"}),
                  newAds: adsInBrief.length,
                  fileName: name,
                  reportType: rType,
                  downloadable: true,
                  ads: adsInBrief.map(a => ({ ...a, briefed: true })),
                });

                const newReports = [];
                generated.forEach(g => {
                  newReports.push(makeReport(g.fileName, g.reportType));
                });

                setProducts(prev => prev.map(p =>
                  p.id === selectedId
                    ? { ...p, reports: [...newReports, ...p.reports] }
                    : p
                ));
                setSelectedAds(new Set());
                setSelectAll(false);
                setLastUpdated(new Date());
              } catch (err) {
                console.error("Error generating DOCX:", err);
                setGenSummary({ totalAds: 0, winners: 0, highPriority: 0, fileName: "Error al generar", reportType: "Error", downloadFiles: [] });
                setGenDone(true);
              }
            })();
          }
        };
        setTimeout(advance, steps[0].duration);
      };

      const closeGenModal = () => { setGenModal(false); };

      const inputCls = "w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 focus:outline-none transition-all";
      const inputSmCls = "flex-1 bg-gray-800/50 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-100 placeholder-gray-500 focus:border-orange-500 focus:outline-none transition-all";

      const timeAgo = (date) => {
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return "Recién nomás";
        if (minutes < 60) return `Hace ${minutes} min`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `Hace ${hours} horas`;
        const days = Math.floor(hours / 24);
        return `Hace ${days} dias`;
      };

      return (
        <>
          <style>{styleSheet}</style>
          <div className="min-h-screen bg-gradient-to-br from-gray-950 via-slate-950 to-gray-950 text-gray-100">

            {/* ===== TOAST DE PROGRESO ===== */}
            <ProgressToast
              open={genModal}
              steps={dynamicSteps()}
              currentStep={genStep}
              done={genDone}
              summary={genSummary}
              onClose={closeGenModal}
              onRedownload={downloadReport}
            />

            {/* ===== BARRA SUPERIOR ===== */}
            <div className="glass-effect sticky top-0 z-40 border-b border-gray-700/30">
              <div className="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">

                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center">
                      <Zap className="w-5 h-5 text-white font-bold" />
                    </div>
                    <span className="text-sm font-bold gradient-text">AdSpy</span>
                  </div>
                  <div className="w-px h-6 bg-gray-700/50" />

                  {/* Selector de producto */}
                  <div className="relative">
                    <button onClick={() => setDropdownOpen(!dropdownOpen)}
                      className="flex items-center gap-2.5 bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-sm text-gray-200 hover:border-gray-600 hover:bg-gray-800 transition-all min-w-52">
                      <Package className="w-4 h-4 text-gray-500 flex-shrink-0" />
                      <span className="truncate">{selected ? selected.name : "Elegí un producto"}</span>
                      <ChevronDown className="w-4 h-4 text-gray-500 ml-auto flex-shrink-0" />
                    </button>

                    {dropdownOpen && (
                      <div className="absolute top-full left-0 mt-2 w-72 glass-effect rounded-xl shadow-2xl overflow-hidden z-30 border border-gray-700/50 animate-slideUp">
                        {products.map((p, idx) => (
                          <button key={p.id}
                            onClick={() => { setSelectedId(p.id); setDropdownOpen(false); setView("report"); }}
                            className={`w-full flex items-center justify-between px-4 py-3 text-sm hover:bg-gray-800/50 text-left transition-all ${p.id === selectedId ? "bg-orange-500/10 text-orange-400 border-l-2 border-orange-500" : "text-gray-300 border-l-2 border-transparent"}`}
                            style={{ animation: `fadeIn 200ms ease ${idx * 40}ms both` }}>
                            <span className="truncate font-medium">{p.name}</span>
                            {p.reports.length > 0 && <span className="text-xs text-gray-500">{p.reports[0].ads.length} ads</span>}
                          </button>
                        ))}
                        <div className="border-t border-gray-700/30">
                          <button onClick={() => { openNew(); setDropdownOpen(false); }}
                            className="w-full flex items-center gap-2 px-4 py-3 text-sm text-orange-400 hover:bg-gray-800/50 font-medium transition-all">
                            <Plus className="w-4 h-4" /> Nuevo producto, dale
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Acciones top bar */}
                <div className="flex items-center gap-3">
                  {view === "report" && selected && (
                    <>
                      <button onClick={openEdit}
                        className="flex items-center gap-2 text-xs font-medium text-gray-400 hover:text-gray-200 px-3 py-2 rounded-lg hover:bg-gray-800/50 transition-all">
                        <Settings className="w-4 h-4" /> Config
                      </button>
                      <div className="relative">
                        <button onClick={() => setGenMenuOpen(!genMenuOpen)} disabled={genModal}
                          className="btn-primary flex items-center gap-2 text-xs font-semibold text-white bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 disabled:from-orange-800 disabled:to-orange-800 disabled:text-orange-300 px-4 py-2 rounded-lg transition-all shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 hover:-translate-y-0.5">
                          <Play className="w-4 h-4" />
                          {selectedAds.size > 0 ? `Generar (${selectedAds.size})` : "Generar"}
                          <ChevronDown className="w-3.5 h-3.5 ml-1" />
                          {hasUnprocessedAds && !selectedAds.size && <Bell className="w-2.5 h-2.5 absolute -top-1 -right-1 text-red-400 animate-pulse" />}
                        </button>
                        {genMenuOpen && (
                          <div className="absolute top-full right-0 mt-2 w-72 glass-effect rounded-xl shadow-2xl overflow-hidden z-30 border border-gray-700/50 animate-slideUp">
                            <button onClick={() => { setGenType("creative"); startGenerate("creative"); setGenMenuOpen(false); }}
                              className="w-full text-left px-4 py-3 hover:bg-gray-800/50 transition-all border-b border-gray-700/30">
                              <div className="text-sm font-medium text-gray-200">Brief de Adaptación Creativa</div>
                              <div className="text-xs text-gray-500 mt-1">Le afanamos los mejores angulos a la competencia</div>
                            </button>
                            <button onClick={() => { setGenType("strategic"); startGenerate("strategic"); setGenMenuOpen(false); }}
                              className="w-full text-left px-4 py-3 hover:bg-gray-800/50 transition-all border-b border-gray-700/30">
                              <div className="text-sm font-medium text-gray-200">Análisis Estratégico</div>
                              <div className="text-xs text-gray-500 mt-1">Patrones ganadores y angulos nuevos para romperla</div>
                            </button>
                            <button onClick={() => { setGenType("both"); startGenerate("both"); setGenMenuOpen(false); }}
                              className="w-full text-left px-4 py-3 hover:bg-gray-800/50 transition-all">
                              <div className="text-sm font-medium text-orange-400">Ambos Reportes</div>
                              <div className="text-xs text-gray-500 mt-1">Todo junto como choripan completo</div>
                            </button>
                          </div>
                        )}
                      </div>
                    </>
                  )}
                  {view === "form" && (
                    <>
                      <button onClick={cancel}
                        className="flex items-center gap-1.5 text-xs font-medium text-gray-400 hover:text-gray-200 px-3 py-2 rounded-lg hover:bg-gray-800/50 transition-all">
                        <ArrowLeft className="w-4 h-4" /> Volver
                      </button>
                      <button onClick={save}
                        className="btn-primary flex items-center gap-2 text-xs font-semibold text-white bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 px-4 py-2 rounded-lg transition-all shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50">
                        <Check className="w-4 h-4" /> Guardar
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* ===== CONTENIDO ===== */}
            <div className="max-w-5xl mx-auto px-6 py-6">

              {/* ──────── VISTA REPORTE ──────── */}
              {view === "report" && selected && (
                <div className="space-y-6 animate-fadeIn">

                  {/* Header del producto */}
                  <div className="flex items-start justify-between">
                    <div>
                      <h1 className="text-2xl font-bold text-gray-100 mb-3">{selected.name}</h1>
                      <div className="flex items-center gap-4 flex-wrap">
                        <a href={selected.landing} target="_blank" rel="noopener noreferrer" className="text-xs font-medium text-orange-400 hover:text-orange-300 flex items-center gap-1.5 transition-colors">
                          <ExternalLink className="w-3.5 h-3.5" /> Landing
                        </a>
                        <div className="w-px h-4 bg-gray-700/50" />
                        <span className="text-xs font-medium text-gray-500">
                          <TrendingUp className="w-3.5 h-3.5 inline mr-1" />
                          {selected.competitors.length} competidores
                        </span>
                        <span className="text-xs font-medium text-gray-500">
                          <Upload className="w-3.5 h-3.5 inline mr-1" />
                          {selected.contextFiles.length} archivos
                        </span>
                        {selected.driveFolder && (
                          <a href={selected.driveFolder} target="_blank" rel="noopener noreferrer" className="text-xs font-medium text-cyan-400 hover:text-cyan-300 flex items-center gap-1.5 transition-colors">
                            <FolderOpen className="w-3.5 h-3.5" /> Drive
                          </a>
                        )}
                      </div>
                    </div>
                    {lastUpdated && (
                      <div className="text-right">
                        <div className="text-xs text-gray-600 flex items-center gap-1.5">
                          <Clock className="w-3.5 h-3.5" />
                          {timeAgo(lastUpdated)}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Stats Cards */}
                  {latestReport && (
                    <div className="grid grid-cols-4 gap-3">
                      {[
                        { label: "Avisos totales", value: latestReport.ads.length, icon: Package, color: "text-gray-100", bg: "from-gray-700/20 to-gray-700/10" },
                        { label: "Los grosos", value: latestReport.ads.filter(a => a.status === "winner").length, icon: TrendingUp, color: "text-emerald-400", bg: "from-emerald-700/20 to-emerald-700/10" },
                        { label: "Re urgentes", value: latestReport.ads.filter(a => a.priority === "ALTA").length, icon: AlertCircle, color: "text-red-400", bg: "from-red-700/20 to-red-700/10" },
                        { label: "Ya salieron", value: latestReport.ads.filter(a => a.briefed).length, icon: CheckCircle, color: "text-blue-400", bg: "from-blue-700/20 to-blue-700/10" },
                      ].map((s, idx) => {
                        const Icon = s.icon;
                        return (
                          <div key={s.label} className={`stat-card bg-gradient-to-br ${s.bg} rounded-xl border border-gray-700/30 px-4 py-4 hover:border-gray-600/50 group`} style={{ animation: `slideUp 400ms ease ${idx * 80}ms both` }}>
                            <div className="flex items-center justify-between mb-2">
                              <div className={`text-2xl font-bold ${s.color}`}>
                                <AnimatedCounter value={s.value} duration={800} />
                              </div>
                              <Icon className={`w-5 h-5 ${s.color} opacity-50 group-hover:opacity-100 transition-opacity`} />
                            </div>
                            <div className="text-xs font-medium text-gray-500">{s.label}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Reportes generados */}
                  {selected.reports.length > 0 && (
                    <div className="glass-effect rounded-xl border border-gray-700/30 overflow-hidden">
                      <div className="px-5 py-4 border-b border-gray-700/30">
                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Reportes que ya salieron</h3>
                      </div>
                      <div className="divide-y divide-gray-700/20">
                        {selected.reports.map((r, i) => (
                          <div key={i} className="px-5 py-4 flex items-center justify-between hover:bg-gray-800/20 transition-all group" style={{ animation: `fadeIn 300ms ease ${i * 100}ms both` }}>
                            <div className="flex items-center gap-3.5 flex-1">
                              <div className="w-10 h-10 bg-orange-500/10 rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-orange-500/20 transition-colors">
                                <FileText className="w-5 h-5 text-orange-500" />
                              </div>
                              <div className="flex-1">
                                <div className="flex items-center gap-2.5 mb-1">
                                  <span className="text-sm font-semibold text-gray-200">{r.fileName}</span>
                                  {r.reportType && (
                                    <Badge color={r.reportType.includes("Creativ") ? "orange" : "purple"}>
                                      {r.reportType.includes("Creativ") ? "Adaptación" : "Estratégico"}
                                    </Badge>
                                  )}
                                </div>
                                <div className="flex items-center gap-2 text-xs text-gray-500">
                                  <Clock className="w-3 h-3" />
                                  {r.date} {r.time && <span className="text-gray-600">a las {r.time}</span>}
                                  <span className="text-gray-700">·</span>
                                  <Package className="w-3 h-3" />
                                  {r.newAds} ads
                                </div>
                              </div>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              {r.driveLink ? (
                                <a href={r.driveLink} target="_blank" rel="noopener noreferrer"
                                  className="flex items-center gap-1 text-xs font-medium text-orange-400 hover:text-orange-300 bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 px-3 py-1.5 rounded-lg transition-all">
                                  <Eye className="w-3.5 h-3.5" /> Ver en Drive
                                </a>
                              ) : (
                                <button onClick={() => setViewingReport(viewingReport === i ? null : i)}
                                  className="flex items-center gap-1 text-xs font-medium text-orange-400 hover:text-orange-300 bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 px-3 py-1.5 rounded-lg transition-all">
                                  <Eye className="w-3.5 h-3.5" /> {viewingReport === i ? "Cerrar" : "Ver"}
                                </button>
                              )}
                              {r.downloadable && generatedFiles.current[r.fileName] ? (
                                <button onClick={() => downloadReport(r.fileName)}
                                  className="flex items-center gap-1 text-xs font-medium text-emerald-400 hover:text-emerald-300 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 px-3 py-1.5 rounded-lg transition-all">
                                  <Download className="w-3.5 h-3.5" /> Descargar
                                </button>
                              ) : r.driveLink ? (
                                <a href={r.driveLink} target="_blank" rel="noopener noreferrer"
                                  className="flex items-center gap-1 text-xs font-medium text-cyan-400 hover:text-cyan-300 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-500/20 px-3 py-1.5 rounded-lg transition-all">
                                  <FolderOpen className="w-3.5 h-3.5" /> Drive
                                </a>
                              ) : null}
                            </div>
                          </div>
                        ))}
                      </div>

                      {/* Inline report viewer */}
                      {viewingReport !== null && selected.reports[viewingReport] && (
                        <div className="border-t border-gray-700/30 bg-gray-950/50 animate-slideUp">
                          <div className="px-5 py-3 flex items-center justify-between border-b border-gray-700/30 bg-gray-900/30">
                            <span className="text-xs font-semibold text-gray-400">
                              Vista previa: {selected.reports[viewingReport].fileName}
                            </span>
                            <button onClick={() => setViewingReport(null)} className="text-gray-500 hover:text-gray-300 transition-colors">
                              <X className="w-4 h-4" />
                            </button>
                          </div>
                          <div className="p-4 max-h-96 overflow-y-auto space-y-2.5">
                            {selected.reports[viewingReport].ads.map((ad, ai) => (
                              <div key={ai} className="bg-gray-900/50 rounded-lg border border-gray-700/30 p-3.5 hover:border-gray-600/50 transition-all" style={{ animation: `fadeIn 200ms ease ${ai * 30}ms both` }}>
                                <div className="flex items-start justify-between mb-2">
                                  <div className="flex items-center gap-2.5 flex-1">
                                    <StatusDot status={ad.status} />
                                    <span className="text-xs font-medium text-gray-400">{ad.brand}</span>
                                    <span className="text-xs text-gray-700">·</span>
                                    <span className="text-xs text-gray-300">{ad.angle}</span>
                                  </div>
                                  <div className="flex items-center gap-2">
                                    {ad.sentiment && <SentimentIcon sentiment={ad.sentiment} />}
                                    <span className="text-xs text-gray-500">{ad.days}d</span>
                                  </div>
                                </div>
                                <div className="text-sm font-semibold text-orange-400">{ad.headline}</div>
                                <div className="flex items-center gap-2 mt-2 pt-2 border-t border-gray-700/20">
                                  <Badge color={ad.priority === "ALTA" ? "red" : "orange"}>{ad.priority}</Badge>
                                  {ad.briefed && <CheckCircle className="w-3 h-3 text-emerald-400" />}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Tabla de ads con filtros */}
                  {latestReport && (
                    <div className="glass-effect rounded-xl border border-gray-700/30 overflow-hidden">
                      <div className="px-5 py-4 border-b border-gray-700/30 space-y-3">
                        <div className="flex items-center justify-between">
                          <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                            Avisos espiados ({filteredAds.length} de {latestReport.ads.length})
                          </h3>
                          {selectedAds.size > 0 && (
                            <span className="text-xs font-semibold text-orange-400 bg-orange-500/10 px-2.5 py-1 rounded-full">
                              {selectedAds.size} seleccionados
                            </span>
                          )}
                        </div>

                        {/* Filtros */}
                        <div className="grid grid-cols-3 gap-3">
                          <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-600" />
                            <input
                              type="text"
                              value={searchFilter}
                              onChange={e => setSearchFilter(e.target.value)}
                              placeholder="Buscar por titulo o angulo..."
                              className="w-full bg-gray-800/30 border border-gray-700 rounded-lg pl-9 pr-3 py-2 text-xs text-gray-100 placeholder-gray-600 focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 focus:outline-none transition-all"
                            />
                          </div>
                          <select
                            value={filterBrand}
                            onChange={e => setFilterBrand(e.target.value)}
                            className="bg-gray-800/30 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-100 focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 focus:outline-none transition-all"
                          >
                            <option value="all">Todas las marcas</option>
                            {[...new Set(latestReport.ads.map(a => a.brand))].map(brand => (
                              <option key={brand} value={brand}>{brand}</option>
                            ))}
                          </select>
                          <select
                            value={filterPriority}
                            onChange={e => setFilterPriority(e.target.value)}
                            className="bg-gray-800/30 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-100 focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 focus:outline-none transition-all"
                          >
                            <option value="all">Todas las prioridades</option>
                            <option value="ALTA">Alta</option>
                            <option value="MEDIA">Media</option>
                          </select>
                        </div>
                      </div>

                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="text-xs font-semibold text-gray-500 border-b border-gray-700/30 bg-gray-900/40">
                              <th className="text-center px-4 py-3 w-10">
                                <input type="checkbox" checked={selectAll}
                                  onChange={toggleAll}
                                  className="rounded border-gray-600 bg-gray-800 text-orange-500 focus:ring-orange-500/30 w-4 h-4 cursor-pointer" />
                              </th>
                              <th className="text-center px-3 py-3 w-6"></th>
                              <th className="text-left px-4 py-3">Marca</th>
                              <th className="text-left px-4 py-3">Ángulo</th>
                              <th className="text-left px-4 py-3">Headline adaptado</th>
                              <th className="text-center px-4 py-3 w-12">Días</th>
                              <th className="text-center px-4 py-3 w-16">Prior.</th>
                              <th className="text-center px-4 py-3 w-10">Sent.</th>
                              <th className="text-center px-4 py-3 w-8"></th>
                            </tr>
                          </thead>
                          <tbody>
                            {filteredAds.map((ad, idx) => (
                              <tr key={ad.id}
                                onClick={() => toggleAd(ad.id)}
                                className={`table-row-hover border-t border-gray-700/20 cursor-pointer transition-all ${
                                  selectedAds.has(ad.id) ? "bg-orange-500/8" : ""
                                }`}
                                style={{ animation: `fadeIn 200ms ease ${idx * 20}ms both` }}>
                                <td className="text-center px-4 py-3">
                                  <input type="checkbox" checked={selectedAds.has(ad.id)}
                                    onChange={() => toggleAd(ad.id)}
                                    onClick={e => e.stopPropagation()}
                                    className="rounded border-gray-600 bg-gray-800 text-orange-500 focus:ring-orange-500/30 w-4 h-4 cursor-pointer" />
                                </td>
                                <td className="px-3 py-3"><StatusDot status={ad.status} /></td>
                                <td className="px-4 py-3">
                                  <span className="text-xs font-semibold text-gray-300">{ad.brand}</span>
                                </td>
                                <td className="px-4 py-3">
                                  <span className="text-xs text-gray-400">{ad.angle}</span>
                                </td>
                                <td className="px-4 py-3">
                                  <Tooltip text={ad.headline}>
                                    <span className="text-xs font-medium text-orange-400 truncate block">{ad.headline}</span>
                                  </Tooltip>
                                </td>
                                <td className="px-4 py-3 text-center">
                                  <span className="text-xs font-medium text-gray-500">{ad.days}d</span>
                                </td>
                                <td className="px-4 py-3 text-center">
                                  <Badge color={ad.priority === "ALTA" ? "red" : "orange"}>{ad.priority}</Badge>
                                </td>
                                <td className="px-4 py-3 text-center">
                                  {ad.sentiment && <SentimentIcon sentiment={ad.sentiment} />}
                                </td>
                                <td className="px-4 py-3 text-center">
                                  {ad.briefed ? (
                                    <CheckCircle className="w-4 h-4 text-emerald-400 mx-auto" />
                                  ) : (
                                    <AlertCircle className="w-4 h-4 text-orange-400 mx-auto" />
                                  )}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>

                      {/* Selection action bar */}
                      {selectedAds.size > 0 && (
                        <div className="px-5 py-4 border-t border-gray-700/30 bg-gray-800/30 flex items-center justify-between floating-action">
                          <span className="text-xs font-medium text-gray-400">
                            {selectedAds.size} {selectedAds.size === 1 ? "ad" : "ads"} seleccionado{selectedAds.size === 1 ? "" : "s"} para el brief
                          </span>
                          <div className="relative">
                            <button onClick={() => setGenMenuOpen(!genMenuOpen)} disabled={genModal}
                              className="btn-primary flex items-center gap-2 text-xs font-semibold text-white bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 disabled:from-orange-800 disabled:to-orange-800 px-4 py-2 rounded-lg transition-all">
                              <Play className="w-3.5 h-3.5" /> Generar ({selectedAds.size}) <ChevronDown className="w-3.5 h-3.5" />
                            </button>
                            {genMenuOpen && (
                              <div className="absolute bottom-full right-0 mb-2 w-56 glass-effect rounded-xl shadow-2xl overflow-hidden z-30 border border-gray-700/50 animate-slideUp">
                                <button onClick={() => { startGenerate("creative"); setGenMenuOpen(false); }}
                                  className="w-full text-left px-4 py-3 hover:bg-gray-800/50 text-xs font-medium text-gray-200 border-b border-gray-700/30 transition-all">Adaptación Creativa</button>
                                <button onClick={() => { startGenerate("strategic"); setGenMenuOpen(false); }}
                                  className="w-full text-left px-4 py-3 hover:bg-gray-800/50 text-xs font-medium text-gray-200 border-b border-gray-700/30 transition-all">Análisis Estratégico</button>
                                <button onClick={() => { startGenerate("both"); setGenMenuOpen(false); }}
                                  className="w-full text-left px-4 py-3 hover:bg-gray-800/50 text-xs font-medium text-orange-400 transition-all">Ambos Reportes</button>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* ──────── FORMULARIO NUEVO / EDITAR ──────── */}
              {view === "form" && editProduct && (
                <div className="space-y-5 animate-fadeIn">
                  <div className="flex items-center justify-between">
                    <h2 className="text-2xl font-bold text-gray-100">
                      {formMode === "new" ? "Crear nuevo producto" : `Editar: ${ep.name || "Producto"}`}
                    </h2>
                    {formMode === "edit" && (
                      <button onClick={remove}
                        className="flex items-center gap-2 text-xs font-medium text-red-500/70 hover:text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/5 border border-red-500/20 hover:border-red-500/30 transition-all">
                        <Trash2 className="w-4 h-4" /> Eliminar
                      </button>
                    )}
                  </div>

                  {/* Datos básicos */}
                  <div className="glass-effect rounded-xl border border-gray-700/30 p-5 space-y-4">
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Información básica</h3>
                    <div>
                      <label className="text-xs font-medium text-gray-400 block mb-2">Nombre del producto</label>
                      <input type="text" value={ep.name} onChange={e => setEp("name", e.target.value)}
                        placeholder="Ej: CELLU+ Probiótico Vaginal" className={inputCls} />
                    </div>
                    {/* Campos Landing y Drive sacados */}
                  </div>

                  {/* Archivos de contexto */}
                  <div className="glass-effect rounded-xl border border-gray-700/30 p-5">
                    <div className="mb-4">
                      <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Archivos y links de contexto</h3>
                      <p className="text-xs text-gray-600 mt-2">Subí PDFs, documentos, imágenes o pegá links. Todo lo que sirva para entender la marca.</p>
                    </div>
                    <FileDropZone
                      files={ep.contextFiles}
                      onAdd={(f) => setEp("contextFiles", [...ep.contextFiles, f])}
                      onRemove={(i) => setEp("contextFiles", ep.contextFiles.filter((_, idx) => idx !== i))}
                    />
                  </div>

                  {/* Competidores */}
                  <div className="glass-effect rounded-xl border border-gray-700/30 p-5">
                    <div className="mb-4">
                      <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Competidores a monitorear</h3>
                      <p className="text-xs text-gray-600 mt-2">Marcas que vamos a espiar en Meta Ad Library, bancá.</p>
                    </div>
                    {ep.competitors.length > 0 && (
                      <div className="space-y-2 mb-4">
                        {ep.competitors.map((c, i) => (
                          <div key={i} className="flex items-center justify-between bg-gray-800/40 rounded-lg px-4 py-3 group hover:bg-gray-800/60 transition-all" style={{ animation: `fadeIn 300ms ease ${i * 50}ms both` }}>
                            <div className="flex items-center gap-3">
                              <Search className="w-4 h-4 text-gray-600" />
                              <span className="text-sm font-medium text-gray-200">{c.name}</span>
                              <span className="text-xs text-gray-600">· {c.query}</span>
                            </div>
                            <button onClick={() => setEp("competitors", ep.competitors.filter((_, idx) => idx !== i))}
                              className="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all hover:scale-110">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                    <div className="flex gap-2">
                      <input type="text" value={newCompName} onChange={e => setNewCompName(e.target.value)}
                        placeholder="Nombre (ej: O Positiv)" className={inputSmCls}
                        onKeyDown={e => { if (e.key === "Enter" && newCompName && newCompQuery) addComp(); }} />
                      <input type="text" value={newCompQuery} onChange={e => setNewCompQuery(e.target.value)}
                        placeholder="Query (ej: opositivhealth)" className={inputSmCls}
                        onKeyDown={e => { if (e.key === "Enter" && newCompName && newCompQuery) addComp(); }} />
                      <button onClick={addComp} className="text-xs font-medium text-orange-400 bg-orange-500/10 border border-orange-500/30 px-4 py-2 rounded-lg hover:bg-orange-500/20 hover:border-orange-500/50 transition-all">
                        <Plus className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Sin producto */}
              {!selected && view === "report" && (
                <div className="flex flex-col items-center justify-center py-24 animate-fadeIn">
                  <div className="w-16 h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-5">
                    <Package className="w-8 h-8 text-orange-500/50" />
                  </div>
                  <p className="text-gray-500 text-sm mb-6 font-medium">No hay productos cargados</p>
                  <button onClick={openNew} className="flex items-center gap-2 text-sm font-semibold text-white bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 px-6 py-3 rounded-lg transition-all shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 hover:-translate-y-0.5">
                    <Plus className="w-5 h-5" /> Crear primer producto
                  </button>
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
